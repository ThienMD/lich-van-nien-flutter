name: calendar
description: Vietnamese lunar calendar app built with Flutter.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  package_info_plus: ^9.0.1
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - assets/image_1.jpg
    - assets/image_2.jpg
    - assets/image_3.jpg
    - assets/image_4.jpg
    - assets/image_5.jpg
    - assets/image_6.jpg
    - assets/image_7.jpg
    - assets/image_8.jpg
    - assets/image_9.jpg
    - assets/image_10.jpg
    - assets/image_11.jpg
    - assets/image_12.jpg
    - assets/image_13.jpg
    - assets/image_14.jpg
    - assets/image_15.jpg
    - assets/image_16.jpg
    - assets/image_17.jpg
    - assets/image_nature_blur.jpg
    - assets/image_blue_blur.jpg
    - assets/calendar_day.png
    - assets/calendar_month.png
    - assets/calendar_user.png
    - assets/menu.png
    - assets/events.json
    - assets/quotes.json

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

